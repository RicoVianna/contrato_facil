<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Gerador de contratos para serviços, vendas e aluguel. PWA offline-first.">
    
    <title>Gerador de Contratos - Vibecoding</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<div class="container">
    <h1>Gerador de Contratos</h1>

    <label for="categoria">Tipo de contrato:</label>
    <select id="categoria">
        <option value="">Selecione</option>
        <option value="servico">Prestação de Serviços</option>
        <option value="venda">Compra e Venda</option>
        <option value="aluguel">Aluguel</option>
    </select>

    <div id="dadosPartes">
        <div>
            <h3 id="tituloParte1">Dados do Contratante</h3>
            <label for="contratanteNome">Nome:</label>
            <input type="text" id="contratanteNome" placeholder="Nome completo">
            
            <label for="contratanteCPF">CPF:</label>
            <input type="text" id="contratanteCPF" placeholder="000.000.000-00" maxlength="14">
            
            <label for="contratanteEstadoCivil">Estado civil:</label>
            <input type="text" id="contratanteEstadoCivil" placeholder="Solteiro(a), Casado(a), etc">
            
            <label for="contratanteCEP">CEP:</label>
            <input type="text" id="contratanteCEP" placeholder="00000-000" maxlength="9">
            
            <label for="contratanteRua">Rua:</label>
            <input type="text" id="contratanteRua" placeholder="Será preenchido automaticamente">
            
            <label for="contratanteNumero">Número:</label>
            <input type="text" id="contratanteNumero" placeholder="Número">
            
            <label for="contratanteBairro">Bairro:</label>
            <input type="text" id="contratanteBairro" placeholder="Será preenchido automaticamente">
            
            <label for="contratanteCidade">Cidade:</label>
            <input type="text" id="contratanteCidade" placeholder="Será preenchido automaticamente">
            
            <label for="contratanteEstado">Estado:</label>
            <input type="text" id="contratanteEstado" placeholder="Será preenchido automaticamente">
        </div>

        <div>
            <h3 id="tituloParte2">Dados do Contratado</h3>
            <label for="contratadoNome">Nome:</label>
            <input type="text" id="contratadoNome" placeholder="Nome completo">
            
            <label for="contratadoCPF">CPF:</label>
            <input type="text" id="contratadoCPF" placeholder="000.000.000-00" maxlength="14">
            
            <label for="contratadoEstadoCivil">Estado civil:</label>
            <input type="text" id="contratadoEstadoCivil" placeholder="Solteiro(a), Casado(a), etc">
            
            <label for="contratadoCEP">CEP:</label>
            <input type="text" id="contratadoCEP" placeholder="00000-000" maxlength="9">
            
            <label for="contratadoRua">Rua:</label>
            <input type="text" id="contratadoRua" placeholder="Será preenchido automaticamente">
            
            <label for="contratadoNumero">Número:</label>
            <input type="text" id="contratadoNumero" placeholder="Número">
            
            <label for="contratadoBairro">Bairro:</label>
            <input type="text" id="contratadoBairro" placeholder="Será preenchido automaticamente">
            
            <label for="contratadoCidade">Cidade:</label>
            <input type="text" id="contratadoCidade" placeholder="Será preenchido automaticamente">
            
            <label for="contratadoEstado">Estado:</label>
            <input type="text" id="contratadoEstado" placeholder="Será preenchido automaticamente">
        </div>
    </div>

    <hr style="margin:20px 0;">

    <label for="objeto">Objeto do contrato:</label>
    <textarea id="objeto" rows="4" placeholder="Ex: Venda de notebook usado, Prestação de serviços de manutenção..."></textarea>

    <hr style="margin:20px 0;">

    <h3>Pagamento</h3>
    
    <!-- PAGAMENTO PADRÃO (Serviço e Venda) -->
    <div id="pagamentoPadrao">
        <label for="valorServico">Valor do contrato (R$):</label>
        <input type="text" id="valorServico" placeholder="0,00" maxlength="20">
        
        <label for="tipoPagamento">Forma de pagamento:</label>
        <select id="tipoPagamento">
            <option value="">Selecione</option>
            <option value="avista">À vista</option>
            <option value="parcelado">Parcelado</option>
            <option value="entrada">Entrada + parcelas</option>
        </select>
        
        <!-- Campo de entrada (oculto por padrão) -->
        <div id="entradaContainer" style="display:none;">
            <label for="valorEntrada">Valor de entrada (R$):</label>
            <input type="text" id="valorEntrada" placeholder="0,00" maxlength="20">
        </div>
        
        <!-- Campo de parcelas (oculto por padrão) -->
        <div id="parcelasContainer" style="display:none;">
            <label for="numeroParcelas">Número de parcelas:</label>
            <input type="number" id="numeroParcelas" min="1" max="60" placeholder="1">
            
            <label for="dataPrimeiroVencimento" style="margin-top:15px; display:block;">Vencimento da 1ª parcela:</label>
            <input type="date" id="dataPrimeiroVencimento">
        </div>
        
        <!-- Resumo do pagamento -->
        <div id="resumoPagamento" style="font-weight:600; margin-top:10px; color:#16a34a;"></div>
        
        <label for="meioPagamento">Meio de pagamento:</label>
        <select id="meioPagamento">
            <option value="">Selecione</option>
            <option value="PIX">PIX</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cheque">Cheque</option>
            <option value="Boleto">Boleto</option>
            <option value="Transferência">Transferência</option>
        </select>
    </div>

    <!-- ALUGUEL -->
    <div id="aluguelContainer" style="display:none;">
        <label for="valorAluguel">Valor do aluguel mensal (R$):</label>
        <input type="text" id="valorAluguel" placeholder="0,00" maxlength="20">
        
        <label for="tipoGarantia">Tipo de garantia:</label>
        <select id="tipoGarantia">
            <option value="">Selecione</option>
            <option value="caucao">Caução</option>
            <option value="fiador">Fiador</option>
            <option value="seguro">Seguro-fiança</option>
            <option value="nenhuma">Sem garantia</option>
        </select>
        
        <!-- CAUÇÃO -->
        <div id="caucaoContainer" style="display:none;">
            <label for="mesesCaucao">Meses caução (máx. 3):</label>
            <input type="number" id="mesesCaucao" min="1" max="3" placeholder="1">
        </div>
        
        <!-- FIADOR -->
        <div id="fiadorContainer" style="display:none;">
            <label for="nomeFiador">Nome do fiador:</label>
            <input type="text" id="nomeFiador" placeholder="Nome completo">
            
            <label for="cpfFiador">CPF do fiador:</label>
            <input type="text" id="cpfFiador" placeholder="000.000.000-00" maxlength="14">
        </div>
        
        <!-- SEGURO -->
        <div id="seguroContainer" style="display:none;">
            <label for="seguradora">Seguradora:</label>
            <input type="text" id="seguradora" placeholder="Nome da seguradora">
        </div>
    </div>

    <hr style="margin:20px 0;">

    <hr style="margin:20px 0;">

    <h3>Prazo</h3>

    <!-- INÍCIO (aparece apenas em Serviço e Aluguel) -->
    <div id="campoDataInicio" style="display:block;">
        <label for="dataInicio">Data de início:</label>
        <input type="date" id="dataInicio">
    </div>

    <!-- FIM / ENTREGA (aparece em todos, mas com label diferente) -->
    <div id="campoDataFim" style="display:block;">
        <label id="labelDataFim" for="dataFim">Data de término:</label>
        <input type="date" id="dataFim">
    </div>

    <hr style="margin:20px 0;">

    <h3>Disposições Gerais</h3>
    <label for="cidadeForo">Foro para resolução de conflitos (Cidade/Estado):</label>
    <input type="text" id="cidadeForo" placeholder="Ex: São Paulo/SP">
    
    <hr style="margin:20px 0;">

    <button onclick="gerarContrato()">Gerar Contrato</button>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="preencherTeste()" style="background:#64748b; margin-top:0;">Preencher Teste</button>
            <button onclick="limparDados()" id="btnLimpar" style="background:transparent; color:#dc2626; border:2px solid #dc2626; margin-top:0;">Limpar Tudo</button>
        </div>
    
    <div id="resultado" class="result hidden"></div>
    <button onclick="copiarContrato()" style="background:#16a34a; margin-top:10px; display:none;" id="btnCopiar">Copiar Contrato</button>
</div>

<script src="app.js"></script>
</body>
</html>
